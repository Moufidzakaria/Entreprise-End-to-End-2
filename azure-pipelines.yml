trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  BASE_URL: 'https://automationexercise.com'
  LOGIN_EMAIL: 'testautomationmoufid@gmail.com'
  LOGIN_PASSWORD: 'Zakaria2026'
  CI: 'true'

steps:
  # Bloc unique pour verrouiller la version Node 20 du début à la fin
  - script: |
      # 1. Forcer le chargement de NVM (Node Version Manager) et installer Node 20
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      nvm install 20
      nvm use 20
      
      echo "Vérification stricte de la version de Node :"
      node -v

      # 2. Installer les packages npm
      npm install

      # 3. Installer les navigateurs Playwright avec leurs dépendances système
      sudo ./node_modules/.bin/playwright install --with-deps

      # 4. Lancer la suite de tests Playwright
      ./node_modules/.bin/playwright test
    env:
      BASE_URL: $(BASE_URL)
      LOGIN_EMAIL: $(LOGIN_EMAIL)
      LOGIN_PASSWORD: $(LOGIN_PASSWORD)
      CI: $(CI)
    displayName: 'Monolithic Setup and Execute Playwright Tests'

  # Publication des rapports JUnit XML
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/playwright-report/results.xml'
    condition: always()
    displayName: 'Publish JUnit XML metrics reports'

  # Archivage du dossier de rapport visuel HTML
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'
    condition: always()
    displayName: 'Archive Playwright HTML report output bundles'