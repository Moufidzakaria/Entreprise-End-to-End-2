trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  BASE_URL: 'https://automationexercise.com'
  LOGIN_EMAIL: 'testautomationmoufid@gmail.com'
  LOGIN_PASSWORD: 'Zakaria2026'
  CI: 'true'
  # Force Playwright à stocker et lire les navigateurs dans le dossier du projet
  PLAYWRIGHT_BROWSERS_PATH: '$(System.DefaultWorkingDirectory)/.cache/ms-playwright'

steps:
  - script: |
      # 1. Charger NVM et forcer Node.js 20 dans cette session
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      nvm install 20
      nvm use 20
      
      echo "=== VERIFICATION VERSION NODE ==="
      node -v
      echo "================================="

      # 2. Installer les packages du projet
      npm install

      # 3. Installer les navigateurs au bon endroit sans sudo pour éviter les conflits de droits
      npx playwright install --with-deps

      # 4. Lancer les tests de bout en bout
      npx playwright test
    env:
      BASE_URL: $(BASE_URL)
      LOGIN_EMAIL: $(LOGIN_EMAIL)
      LOGIN_PASSWORD: $(LOGIN_PASSWORD)
      CI: $(CI)
      PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)
    displayName: 'Setup Environment and Run Playwright Tests'

  # Publication des résultats JUnit XML si générés
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/playwright-report/results.xml'
    condition: always()
    displayName: 'Publish JUnit XML metrics reports'

  # Archivage du rapport HTML complet
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'
    condition: always()
    displayName: 'Archive Playwright HTML report output bundles'