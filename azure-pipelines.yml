trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  BASE_URL: 'https://automationexercise.com'
  LOGIN_EMAIL: 'testautomationmoufid@gmail.com'
  LOGIN_PASSWORD: 'Zakaria2026'
  CI: 'true'

steps:
  # Étape 1 : Télécharge et configure explicitement Node.js v20 dans le sous-système de l'agent
  - task: NodeTool@1
    inputs:
      versionSpec: '20.x'
      checkLatest: true
    displayName: 'Install Node.js environment v20'

  # Étape 2 : Installation des packages du projet
  - task: Bash@3
    displayName: 'Install npm dependencies packages'
    inputs:
      targetType: 'inline'
      script: |
        npm install

  # Étape 3 : Récupération des binaires avec privilèges sudo
  - task: Bash@3
    displayName: 'Fetch browser binaries'
    inputs:
      targetType: 'inline'
      script: |
        sudo npx playwright install --with-deps

  # Étape 4 : Exécution robuste des tests de validation E2E
  - task: Bash@3
    displayName: 'Execute Playwright end-to-end tests'
    inputs:
      targetType: 'inline'
      script: |
        npx playwright test
    env:
      BASE_URL: $(BASE_URL)
      LOGIN_EMAIL: $(LOGIN_EMAIL)
      LOGIN_PASSWORD: $(LOGIN_PASSWORD)
      CI: $(CI)

  # Étape 5 : Publication des métriques de tests JUnit XML
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/playwright-report/results.xml'
    condition: always()
    displayName: 'Publish JUnit XML metrics reports'

  # Étape 6 : Archivage des livrables de rapports visuels HTML
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'
    condition: always()
    displayName: 'Archive Playwright HTML report output bundles'